name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'shared/types/**'
  pull_request:
    paths:
      - 'frontend/**'
      - 'shared/types/**'

jobs:
  build-customer:
    name: Customer App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontend-customer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/frontend-customer/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - run: npm run test

  build-admin:
    name: Admin App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/frontend-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/frontend-admin/package-lock.json
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
      - run: npm run test
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production   
    steps:
      - name: Deploy
        run: echo "Deploy step — replace with your actual deploy command"
